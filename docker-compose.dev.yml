# Development override: hot-reload with source mounting
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build

services:
  service:
    volumes:
      - ./service:/app/service
      - ./mcp_local:/app/mcp_local
      - ./config:/app/config:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: ["python", "-m", "uvicorn", "service.main:app", "--host", "0.0.0.0", "--port", "8800", "--reload"]
    environment:
      - LOG_LEVEL=debug
      - LOG_FORMAT=text
